<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 3 — Shipping Cost Defaults</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Shipping cost defaults</h1>
    <p class="subtitle">Falling back to a standard shipping rate when the user hasn't picked one.</p>

    <div class="panel">
      <label for="weight-input">Weight (lbs)</label>
      <input id="weight-input" type="number" step="0.1" value="3" />
      <label for="method-input">Shipping method</label>
      <select id="method-input">
        <option value="">(not chosen — use default)</option>
        <option value="standard">Standard</option>
        <option value="express">Express</option>
      </select>
      <div id="cost-output" class="output"></div>
    </div>

    <div class="tests">
      <div class="test-row"><span>shippingCost(3)</span><span id="badge-1" class="badge"></span></div>
      <div class="test-row"><span>shippingCost(3, "express")</span><span id="badge-2" class="badge"></span></div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
