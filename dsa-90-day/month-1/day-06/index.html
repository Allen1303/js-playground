<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 6 — Coordinate Parser</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Coordinate parser</h1>
    <p class="subtitle">Reading structured data out of an API response (e.g. a [lat, lng] pair).</p>

    <div class="panel">
      <div class="inline-row">
        <div>
          <label for="lat-input">Lat</label>
          <input id="lat-input" type="number" step="0.1" value="40.7" />
        </div>
        <div>
          <label for="lng-input">Lng</label>
          <input id="lng-input" type="number" step="0.1" value="-74.0" />
        </div>
      </div>
      <div id="coords-output" class="output"></div>
    </div>

    <div class="tests">
      <div class="test-row"><span>formatCoords([40.7, -74.0])</span><span id="badge-1" class="badge"></span></div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
