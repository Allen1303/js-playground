<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Day 15 — Object-to-Table Rows</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Object-to-table rows</h1>
    <p class="subtitle">Turning a settings object into rows for a UI table.</p>

    <div class="panel">
      <label>Source object</label>
      <table class="data-table" id="source-table"></table>
      <div class="preset-btns">
        <button id="example-a-btn" type="button">Example A</button>
        <button id="example-b-btn" type="button">Example B</button>
      </div>
      <label>Rows</label>
      <div id="rows-output"></div>
    </div>

    <div class="tests">
      <div class="test-row"><span>toRows({theme:"dark",volume:5})</span><span id="badge-1" class="badge"></span></div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
